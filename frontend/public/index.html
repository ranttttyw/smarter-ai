<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starry · AI 星球漫游</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a0f3d 50%, #0d1b4a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ═══════════════════════════════════════════════════════
           CANVAS BACKGROUND (Stars & Shooting Stars)
        ═══════════════════════════════════════════════════════ */
        #starsCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* ═══════════════════════════════════════════════════════
           CONTENT WRAPPER (Above Canvas)
        ═══════════════════════════════════════════════════════ */
        #appContainer {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ═══════════════════════════════════════════════════════
           HEADER
        ═══════════════════════════════════════════════════════ */
        .header {
            padding: 16px 32px;
            backdrop-filter: blur(16px);
            background: rgba(10, 14, 39, 0.4);
            border-bottom: 1px solid rgba(200, 190, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .passport-btn {
            background: transparent;
            border: 1px solid rgba(200, 190, 255, 0.3);
            color: #e2e8f0;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            position: relative;
        }

        .passport-btn:hover {
            background: rgba(200, 190, 255, 0.1);
            border-color: rgba(200, 190, 255, 0.5);
        }

        #prefDot {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 8px;
            height: 8px;
            background: #f87171;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #prefDot.has-data {
            opacity: 1;
        }

        /* ═══════════════════════════════════════════════════════
           MAIN CONTENT AREA
        ═══════════════════════════════════════════════════════ */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px 180px;
            position: relative;
        }

        /* ═══════════════════════════════════════════════════════
           PLANETS CONTAINER (THE CENTERPIECE)
        ═══════════════════════════════════════════════════════ */
        .planets-container {
            display: flex;
            gap: 100px;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .planets-container.hidden-up {
            opacity: 0;
            transform: translateY(-80px) scale(0.5);
            pointer-events: none;
            height: 0;
            margin: 0;
            overflow: hidden;
        }

        /* ═══════════════════════════════════════════════════════
           PLANET SPHERE
        ═══════════════════════════════════════════════════════ */
        .planet {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* planets hide via .hidden-up when results show */

        .planet:hover {
            transform: scale(1.12);
        }

        .planet.dim {
            opacity: 0.35;
            transform: scale(0.9);
        }

        /* Planet atmospheres (::before) */
        .planet::before {
            content: '';
            position: absolute;
            inset: -25px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--glow-color, #4285f4), transparent);
            opacity: 0.4;
            filter: blur(20px);
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .planet:hover::before {
            opacity: 0.7;
        }

        /* Gemini - Blue Crystal Planet */
        .planet.gemini {
            --glow-color: rgba(66, 133, 244, 0.5);
            background:
                radial-gradient(circle at 25% 25%, rgba(255,255,255,0.35) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #60a5fa 0%, #3b82f6 40%, #1e40af 70%, #1e3a5f 100%);
            box-shadow:
                inset -4px -4px 12px rgba(0, 0, 0, 0.5),
                inset 3px 3px 8px rgba(255, 255, 255, 0.15),
                0 0 30px rgba(59, 130, 246, 0.4),
                0 0 60px rgba(59, 130, 246, 0.15);
        }

        .planet.gemini::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #fff, #93c5fd);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            animation: moonOrbit 5s linear infinite;
            box-shadow: 0 0 12px rgba(147, 197, 253, 0.8);
        }

        @keyframes moonOrbit {
            0% { transform: rotate(0deg) translateX(58px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(58px) rotate(-360deg); }
        }

        /* DeepSeek - Purple Nebula Planet */
        .planet.deepseek {
            --glow-color: rgba(139, 92, 246, 0.5);
            background:
                radial-gradient(circle at 25% 25%, rgba(255,255,255,0.3) 0%, transparent 35%),
                radial-gradient(circle at 60% 60%, #a78bfa 0%, #7c3aed 35%, #5b21b6 65%, #3b0764 100%);
            box-shadow:
                inset -4px -4px 12px rgba(0, 0, 0, 0.5),
                inset 3px 3px 8px rgba(255, 255, 255, 0.1),
                0 0 30px rgba(139, 92, 246, 0.4),
                0 0 60px rgba(139, 92, 246, 0.15);
        }

        /* Saturn ring for DeepSeek */
        .planet.deepseek::after {
            content: '';
            position: absolute;
            width: 140%;
            height: 30%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(70deg);
            border: 2px solid rgba(196, 181, 253, 0.35);
            border-radius: 50%;
            animation: ringPulse 4s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(167, 139, 250, 0.2);
        }

        @keyframes ringPulse {
            0%, 100% { border-color: rgba(196, 181, 253, 0.25); }
            50% { border-color: rgba(196, 181, 253, 0.55); }
        }

        /* GLM - Teal Aurora Planet */
        .planet.glm {
            --glow-color: rgba(20, 184, 166, 0.5);
            background:
                radial-gradient(circle at 25% 25%, rgba(255,255,255,0.3) 0%, transparent 35%),
                radial-gradient(circle at 50% 50%, #2dd4bf 0%, #14b8a6 35%, #0d9488 65%, #064e3b 100%);
            box-shadow:
                inset -4px -4px 12px rgba(0, 0, 0, 0.5),
                inset 3px 3px 8px rgba(255, 255, 255, 0.1),
                0 0 30px rgba(20, 184, 166, 0.4),
                0 0 60px rgba(20, 184, 166, 0.15);
            overflow: hidden;
        }

        /* Aurora shimmer on GLM */
        .planet.glm::after {
            content: '';
            position: absolute;
            inset: -10px;
            background: linear-gradient(
                135deg,
                transparent 30%,
                rgba(94, 234, 212, 0.4) 45%,
                rgba(52, 211, 153, 0.2) 55%,
                transparent 70%
            );
            animation: auroraShimmer 3s ease-in-out infinite;
            border-radius: 50%;
        }

        @keyframes auroraShimmer {
            0%, 100% { transform: rotate(0deg); opacity: 0.6; }
            50% { transform: rotate(180deg); opacity: 1; }
        }

        /* Planet Selection States */
        .planet.selected {
            transform: scale(1.1);
            filter: brightness(1.3);
            animation: selectedGlow 2s ease-in-out infinite;
        }

        @keyframes selectedGlow {
            0%, 100% { box-shadow: inset -4px -4px 12px rgba(0,0,0,0.5), inset 3px 3px 8px rgba(255,255,255,0.15), 0 0 30px var(--glow-color), 0 0 60px var(--glow-color); }
            50% { box-shadow: inset -4px -4px 12px rgba(0,0,0,0.5), inset 3px 3px 8px rgba(255,255,255,0.15), 0 0 50px var(--glow-color), 0 0 90px var(--glow-color); }
        }

        .planet.thinking {
            animation: planetSpin 1.2s linear infinite, selectedGlow 1s ease-in-out infinite;
        }

        @keyframes planetSpin {
            0% { transform: rotateY(0deg) scale(1.1); }
            100% { transform: rotateY(360deg) scale(1.1); }
        }

        /* Floating animation */
        @keyframes float1 {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        @keyframes float3 {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .planet-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .planet-wrapper:nth-child(1) .planet {
            animation: float1 5.5s ease-in-out infinite;
        }

        .planet-wrapper:nth-child(2) .planet {
            animation: float2 6.2s ease-in-out 0.3s infinite;
        }

        .planet-wrapper:nth-child(3) .planet {
            animation: float3 6.8s ease-in-out 0.6s infinite;
        }

        .planet-label {
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1;
            opacity: 0.8;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .planet-wrapper:hover .planet-label {
            opacity: 1;
            color: #f1f5f9;
        }

        /* ═══════════════════════════════════════════════════════
           PRESET TABS
        ═══════════════════════════════════════════════════════ */
        .preset-section {
            width: 100%;
            max-width: 800px;
            margin: 0 auto 8px;
        }

        .preset-tabs {
            display: flex;
            gap: 24px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(200, 190, 255, 0.15);
            padding-bottom: 12px;
        }

        .preset-tab {
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0 4px;
        }

        .preset-tab.active {
            color: #a78bfa;
            border-bottom: 2px solid #a78bfa;
            padding-bottom: -2px;
        }

        .preset-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .preset-chip {
            background: rgba(200, 190, 255, 0.1);
            border: 1px solid rgba(200, 190, 255, 0.25);
            color: #e2e8f0;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
        }

        .preset-chip:hover {
            background: rgba(200, 190, 255, 0.2);
            border-color: rgba(200, 190, 255, 0.5);
            transform: translateY(-2px);
        }

        /* ═══════════════════════════════════════════════════════
           INPUT AREA (BOTTOM BAR)
        ═══════════════════════════════════════════════════════ */
        .input-section {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 20px 16px;
            z-index: 50;
            background: linear-gradient(to top, rgba(10,14,39,0.95) 60%, transparent);
            pointer-events: none;
        }

        .input-section-inner {
            max-width: 800px;
            margin: 0 auto;
            pointer-events: auto;
        }

        .input-bar {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(15, 10, 40, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(200, 190, 255, 0.25);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .input-bar.with-gemini {
            border-top-color: rgba(66, 133, 244, 0.4);
        }

        .input-bar.with-deepseek {
            border-top-color: rgba(124, 58, 237, 0.4);
        }

        .input-bar.with-glm {
            border-top-color: rgba(13, 148, 136, 0.4);
        }

        #queryInput {
            flex: 1;
            background: transparent;
            border: none;
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
            resize: none;
            font-family: inherit;
            max-height: 100px;
            line-height: 1.4;
        }

        #queryInput::placeholder {
            color: #64748b;
        }

        .send-btn {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.5);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ═══════════════════════════════════════════════════════
           RESULTS SECTION
        ═══════════════════════════════════════════════════════ */
        .results-wrapper {
            padding: 20px 20px 160px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .summary-card {
            background: rgba(15, 10, 40, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(200, 190, 255, 0.2);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .summary-eyebrow {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .summary-text {
            font-size: 15px;
            line-height: 1.6;
            color: #e2e8f0;
            margin-bottom: 12px;
        }

        .summary-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .summary-chip {
            background: rgba(167, 139, 250, 0.15);
            color: #a78bfa;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .models-grid {
            display: grid;
            gap: 20px;
            margin-bottom: 24px;
        }

        /* Dynamic columns: always stretch to fill */
        .models-grid.cols-1 { grid-template-columns: 1fr; max-width: 600px; margin-left: auto; margin-right: auto; }
        .models-grid.cols-2 { grid-template-columns: 1fr 1fr; }
        .models-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

        .model-card {
            background: rgba(15, 10, 40, 0.5);
            border: 1px solid var(--card-border, rgba(200, 190, 255, 0.15));
            border-top: 2px solid var(--card-color, #4285f4);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease;
        }

        .model-card:hover {
            background: rgba(15, 10, 40, 0.7);
            border-color: var(--card-color, #4285f4);
        }

        .model-card.is-selected {
            background: rgba(15, 10, 40, 0.8);
            box-shadow: 0 0 20px var(--card-shadow, rgba(66, 133, 244, 0.2));
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(200, 190, 255, 0.1);
        }

        .card-icon {
            width: 40px;
            height: 40px;
            background: var(--card-color, #4285f4);
            color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
        }

        .card-info h3 {
            font-size: 14px;
            font-weight: 700;
            color: #e2e8f0;
        }

        .card-info p {
            font-size: 12px;
            color: #94a3b8;
        }

        .card-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .tag {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 500;
        }

        .tag.t-tone {
            background: rgba(167, 139, 250, 0.2);
            color: #c4b5fd;
        }

        .tag.t-depth {
            background: rgba(102, 153, 255, 0.2);
            color: #bfdbfe;
        }

        .tag.t-structure {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        .tag.t-gray {
            background: rgba(148, 163, 184, 0.15);
            color: #cbd5e1;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 14px;
        }

        .stat-item {
            background: rgba(200, 190, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(200, 190, 255, 0.1);
        }

        .stat-name {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .stat-bar {
            height: 4px;
            background: rgba(200, 190, 255, 0.15);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .stat-fill {
            height: 100%;
            border-radius: 2px;
        }

        .stat-val {
            font-size: 10px;
            color: #cbd5e1;
            font-weight: 600;
        }

        .keypoint {
            background: rgba(200, 190, 255, 0.08);
            border-left: 2px solid var(--card-color, #4285f4);
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .keypoint-label {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .keypoint-text {
            font-size: 13px;
            color: #e2e8f0;
            line-height: 1.5;
        }

        .answer-section {
            margin-bottom: 14px;
        }

        .toggle-btn {
            background: transparent;
            border: 1px solid rgba(200, 190, 255, 0.2);
            color: #cbd5e1;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .toggle-btn:hover {
            background: rgba(200, 190, 255, 0.1);
            border-color: rgba(200, 190, 255, 0.4);
        }

        .toggle-btn.open {
            color: var(--card-color, #4285f4);
            border-color: var(--card-color, #4285f4);
        }

        .answer-content {
            background: rgba(15, 10, 40, 0.4);
            border: 1px solid rgba(200, 190, 255, 0.1);
            border-radius: 6px;
            padding: 12px;
            font-size: 13px;
            line-height: 1.6;
            color: #cbd5e1;
            max-height: 100px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .answer-content.open {
            max-height: 500px;
            overflow-y: auto;
        }

        .answer-content code {
            background: rgba(0, 0, 0, 0.3);
            padding: 1px 4px;
            border-radius: 3px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
        }

        .answer-content pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 12px;
            line-height: 1.4;
        }

        .answer-content strong {
            color: #f1f5f9;
            font-weight: 600;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .choose-btn {
            flex: 1;
            background: linear-gradient(135deg, var(--card-color, #4285f4), var(--card-dark, #1a3a6e));
            border: none;
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .choose-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px var(--card-shadow, rgba(66, 133, 244, 0.3));
        }

        .choose-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ═══════════════════════════════════════════════════════
           REACTIONS PANEL
        ═══════════════════════════════════════════════════════ */
        .reactions-panel {
            background: rgba(15, 10, 40, 0.6);
            border-top: 1px solid rgba(200, 190, 255, 0.15);
            border-radius: 6px;
            padding: 14px;
            margin-top: 12px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reactions-header {
            font-size: 12px;
            color: #cbd5e1;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .reaction-bubbles {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .reaction-btn {
            background: rgba(200, 190, 255, 0.1);
            border: 1px solid rgba(200, 190, 255, 0.2);

<body>

                    <button onclick="backToUniverse()" style="background:transparent;border:1px solid rgba(200,190,255,0.25);color:#94a3b8;padding:8px 20px;border-radius:20px;font-size:12px;cursor:pointer;transition:all 0.3s;">← 回到宇宙，换个问题</button>

    <script>
// ══════════════════════════════════════════════════════
//  MODEL CONFIG
// ══════════════════════════════════════════════════════
const MODELS = [
    { id: 'gemini',   name: 'Gemini Flash', org: 'Google',   c: '#4285f4', bg: '#eff6ff', shadow: 'rgba(66,133,244,0.12)',  icon: 'G' },
    { id: 'deepseek', name: 'DeepSeek V3',  org: 'DeepSeek', c: '#7c3aed', bg: '#f5f3ff', shadow: 'rgba(124,58,237,0.12)', icon: 'D' },
    { id: 'glm',      name: 'GLM-4.7',      org: '智谱 AI',  c: '#0d9488', bg: '#f0fdfa', shadow: 'rgba(13,148,136,0.12)',  icon: 'Z' },
];

const PRESETS = {
    writing: [
        "帮我写一篇小红书种草文案，主题是「一个人去京都旅行」",
        "给我写一封拒绝 offer 的邮件，语气委婉但坚定",
        "帮我写一段产品介绍，介绍一款帮助学生备考的 AI 工具",
    ],
    thinking: [
        "如果你只剩一年生命，你会怎么度过？",
        "自由和安全之间，你更看重哪个？",
        "你觉得孤独是一种力量还是一种缺失？",
    ]
};

// ══════════════════════════════════════════════════════
//  CANVAS STARS & SHOOTING STARS
// ══════════════════════════════════════════════════════
const canvas = document.getElementById('starsCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const stars = [];
for (let i = 0; i < 250; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.5 + 0.5,
        opacity: Math.random() * 0.5 + 0.3,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        phase: Math.random() * Math.PI * 2,
        vx: (Math.random() - 0.5) * 0.1,
        vy: (Math.random() - 0.5) * 0.1,
    });
}

let shootingStarTime = 0;
let nextShootingStarTime = Math.random() * 4000 + 4000;

function drawStars() {
    ctx.fillStyle = 'rgba(10, 14, 39, 0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw static stars with twinkling
    stars.forEach(star => {
        star.phase += star.twinkleSpeed;
        star.opacity = Math.sin(star.phase) * 0.3 + 0.4;

        star.x += star.vx;
        star.y += star.vy;

        if (star.x < 0) star.x = canvas.width;
        if (star.x > canvas.width) star.x = 0;
        if (star.y < 0) star.y = canvas.height;
        if (star.y > canvas.height) star.y = 0;

        ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fill();
    });

    // Shooting stars
    shootingStarTime += 16;
    if (shootingStarTime > nextShootingStarTime) {
        const sx = Math.random() * canvas.width;
        const sy = Math.random() * canvas.height * 0.5;
        const angle = Math.random() * Math.PI * 0.5 + Math.PI * 0.25;
        const speed = 3;

        const shootingLength = 80;
        for (let i = 0; i < shootingLength; i++) {
            const fade = 1 - i / shootingLength;
            const x = sx + Math.cos(angle) * i * speed;
            const y = sy + Math.sin(angle) * i * speed;
            ctx.fillStyle = `rgba(255, 255, 255, ${fade * 0.6})`;
            ctx.beginPath();
            ctx.arc(x, y, 1 + fade, 0, Math.PI * 2);
            ctx.fill();
        }

        shootingStarTime = 0;
        nextShootingStarTime = Math.random() * 4000 + 4000;
    }

    requestAnimationFrame(drawStars);
}
drawStars();

// ══════════════════════════════════════════════════════
//  HELPER FUNCTIONS
// ══════════════════════════════════════════════════════
function fmt(raw) {
    return raw
        .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre>${esc(code.trim())}</pre>`)
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
}

function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function tagClass(type) {
    const map = { tone: 't-tone', depth: 't-depth', structure: 't-structure' };
    return map[type] || 't-gray';
}

function timeAgo(ts) {
    const diff = Date.now() - ts;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
    if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
    return Math.floor(diff / 86400000) + ' 天前';
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
}

const PREF_KEY = 'modelmix_prefs';
const REACTIONS_KEY = 'starry_reactions';

function loadPrefs() {
    try {
        return JSON.parse(localStorage.getItem(PREF_KEY)) || [];
    } catch {
        return [];
    }
}

function savePrefs(prefs) {
    localStorage.setItem(PREF_KEY, JSON.stringify(prefs));
}

function recordChoice(question, modelId) {
    const prefs = loadPrefs();
    prefs.unshift({
        question,
        modelId,
        modelName: MODELS.find(m => m.id === modelId)?.name || modelId,
        ts: Date.now()
    });
    savePrefs(prefs.slice(0, 50));
    updatePrefDot();
    if (document.getElementById('prefPanel').classList.contains('open')) {
        renderPrefContent();
    }
}

function recordReaction(question, modelId, reaction, comment) {
    try {
        const reactions = JSON.parse(localStorage.getItem(REACTIONS_KEY)) || [];
        reactions.unshift({
            question,
            chosenModel: modelId,
            reaction,
            comment,
            timestamp: Date.now()
        });
        localStorage.setItem(REACTIONS_KEY, JSON.stringify(reactions.slice(0, 100)));
    } catch (e) {
        console.error('Failed to record reaction:', e);
    }
}

function clearPrefs() {
    if (!confirm('确认清空所有星球日志？')) return;
    localStorage.removeItem(PREF_KEY);
    updatePrefDot();
    renderPrefContent();
    showToast('已清空日志');
}

function updatePrefDot() {
    const prefs = loadPrefs();
    document.getElementById('prefDot').classList.toggle('has-data', prefs.length > 0);
}

function togglePrefPanel() {
    const panel = document.getElementById('prefPanel');
    const overlay = document.getElementById('prefOverlay');
    const isOpen = panel.classList.toggle('open');
    overlay.classList.toggle('open', isOpen);
    if (isOpen) renderPrefContent();
}

function renderPrefContent() {
    const prefs = loadPrefs();
    const box = document.getElementById('prefContent');

    if (prefs.length === 0) {
        box.innerHTML = `<div class="pref-empty">还没有日志。<br>每次你做出选择后，数据就会自动积累在这里。</div>`;
        return;
    }

    const counts = {};
    MODELS.forEach(m => counts[m.id] = 0);
    prefs.forEach(p => { if (counts[p.modelId] !== undefined) counts[p.modelId]++; });
    const maxCount = Math.max(...Object.values(counts), 1);
    const totalChoices = prefs.length;
    const favoriteId = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
    const favoriteModel = MODELS.find(m => m.id === favoriteId);

    const statsHtml = `
        <div class="pref-stats">
            <div class="pref-stat-card">
                <div class="psc-label">探索次数</div>
                <div class="psc-val">${totalChoices}</div>
                <div class="psc-sub">次星球选择</div>
            </div>
            <div class="pref-stat-card">
                <div class="psc-label">最爱星球</div>
                <div class="psc-val" style="color:${favoriteModel.c};font-size:14px;">${favoriteModel.name}</div>
                <div class="psc-sub">共 ${counts[favoriteId]} 次（${Math.round(counts[favoriteId]/totalChoices*100)}%）</div>
            </div>
            <div class="pref-stat-card">
                <div class="psc-label">最近降落</div>
                <div class="psc-val" style="font-size:13px;padding-top:2px;">${prefs[0].modelName}</div>
                <div class="psc-sub">${timeAgo(prefs[0].ts)}</div>
            </div>
        </div>`;

    const barsHtml = `
        <div class="pref-model-bars">
            <div class="pmb-title">星球偏好分布</div>
            ${MODELS.filter(m => counts[m.id] > 0).sort((a, b) => counts[b.id] - counts[a.id]).map(m => `
                <div class="pmb-row">
                    <div class="pmb-name">${m.name}</div>
                    <div class="pmb-bar-wrap">
                        <div class="pmb-bar-fill" style="width:${counts[m.id]/maxCount*100}%;background:${m.c};"></div>
                    </div>
                    <div class="pmb-count">${counts[m.id]}次</div>
                </div>`).join('')}
        </div>`;

    const histHtml = `
        <div class="pref-history-title">最近选择记录</div>
        <div class="pref-history">
            ${prefs.slice(0, 8).map(p => {
                const m = MODELS.find(x => x.id === p.modelId);
                return `<div class="pref-hist-row">
                    <div class="phr-q">${p.question}</div>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <span class="phr-model" style="background:${m?.bg||'#f3f4f6'};color:${m?.c||'#374151'};">${p.modelName}</span>
                        <span class="phr-time">${timeAgo(p.ts)}</span>
                    </div>
                </div>`;
            }).join('')}
        </div>`;

    // Build radar chart from reactions data
    const radarHtml = buildRadarSection(prefs);

    box.innerHTML = statsHtml + radarHtml + barsHtml + histHtml;

    // Draw radar chart after DOM insert
    setTimeout(() => drawRadarChart(prefs), 50);
}

function buildRadarSection(prefs) {
    return `
        <div class="radar-section">
            <div class="pmb-title">你的星际人格</div>
            <canvas id="radarCanvas" width="280" height="280" style="display:block;margin:0 auto 12px;"></canvas>
            <div id="personaLabel" style="text-align:center;font-size:13px;color:#a78bfa;font-weight:600;margin-bottom:4px;"></div>
            <div id="personaDesc" style="text-align:center;font-size:11px;color:#94a3b8;line-height:1.5;"></div>
        </div>`;
}

function drawRadarChart(prefs) {
    const canvas = document.getElementById('radarCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;
    const R = 110;

    // Compute personality dimensions from choices + reactions
    const reactions = (() => {
        try { return JSON.parse(localStorage.getItem(REACTIONS_KEY)) || []; }
        catch { return []; }
    })();

    // 6 personality dimensions (0-100)
    const dims = {
        '深度思考': 50,   // prefers thoughtful/philosophical answers
        '实用主义': 50,   // prefers practical/useful answers
        '创意追求': 50,   // prefers creative/unique answers
        '情感共鸣': 50,   // connects emotionally with answers
        '探索精神': 50,   // tries different models
        '审美偏好': 50,   // cares about writing quality
    };

    // Analyze reaction patterns
    const reactionMap = {
        '💡 说到心坎里了': { '情感共鸣': 20, '深度思考': 10 },
        '🌊 写得比我好': { '审美偏好': 20, '创意追求': 10 },
        '🧠 角度很独特': { '创意追求': 15, '深度思考': 15 },
        '🎯 就是我想要的': { '实用主义': 20, '审美偏好': 5 },
        '😶 另一个更差': { '实用主义': 10 },
        '✨ 想继续聊聊': { '深度思考': 15, '情感共鸣': 10, '探索精神': 5 },
    };

    reactions.forEach(r => {
        const boosts = reactionMap[r.reaction];
        if (boosts) {
            Object.entries(boosts).forEach(([dim, val]) => {
                dims[dim] = Math.min(100, dims[dim] + val);
            });
        }
    });

    // Exploration spirit: based on model diversity
    const modelSet = new Set(prefs.map(p => p.modelId));
    dims['探索精神'] = Math.min(100, dims['探索精神'] + modelSet.size * 15);

    // Analyze question patterns for depth vs practical
    prefs.forEach(p => {
        const q = p.question || '';
        if (/意义|哲学|人生|自由|孤独|价值|灵魂|思考/.test(q)) {
            dims['深度思考'] = Math.min(100, dims['深度思考'] + 5);
        }
        if (/写|邮件|文案|介绍|文档|报告/.test(q)) {
            dims['实用主义'] = Math.min(100, dims['实用主义'] + 5);
        }
    });

    // Cap all at 100
    Object.keys(dims).forEach(k => dims[k] = Math.min(100, dims[k]));

    const labels = Object.keys(dims);
    const values = Object.values(dims);
    const n = labels.length;

    // Draw background circles
    ctx.clearRect(0, 0, W, H);
    [0.25, 0.5, 0.75, 1].forEach(scale => {
        ctx.beginPath();
        for (let i = 0; i <= n; i++) {
            const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
            const x = cx + Math.cos(angle) * R * scale;
            const y = cy + Math.sin(angle) * R * scale;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.strokeStyle = 'rgba(167, 139, 250, 0.15)';
        ctx.lineWidth = 1;
        ctx.stroke();
    });

    // Draw axis lines
    for (let i = 0; i < n; i++) {
        const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(angle) * R, cy + Math.sin(angle) * R);
        ctx.strokeStyle = 'rgba(167, 139, 250, 0.12)';
        ctx.stroke();
    }

    // Draw data polygon
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
        const idx = i % n;
        const angle = (Math.PI * 2 * idx / n) - Math.PI / 2;
        const r = (values[idx] / 100) * R;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
    grad.addColorStop(0, 'rgba(139, 92, 246, 0.35)');
    grad.addColorStop(1, 'rgba(59, 130, 246, 0.15)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(167, 139, 250, 0.8)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Draw dots on vertices
    for (let i = 0; i < n; i++) {
        const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
        const r = (values[i] / 100) * R;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#a78bfa';
        ctx.fill();
        ctx.strokeStyle = '#1e1b4b';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    // Draw labels
    ctx.font = '11px -apple-system, sans-serif';
    ctx.fillStyle = '#cbd5e1';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < n; i++) {
        const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
        const lx = cx + Math.cos(angle) * (R + 22);
        const ly = cy + Math.sin(angle) * (R + 22);
        ctx.fillText(`${labels[i]} ${values[i]}`, lx, ly);
    }

    // Generate persona type based on dominant dims
    const sorted = Object.entries(dims).sort((a, b) => b[1] - a[1]);
    const top2 = sorted.slice(0, 2).map(d => d[0]);
    const personaTypes = {
        '深度思考+情感共鸣': { label: '🌌 浪漫哲学家', desc: '你喜欢有深度的思考，也在乎内心的共鸣。你选择的不只是答案，而是一种理解世界的方式。' },
        '情感共鸣+深度思考': { label: '🌌 浪漫哲学家', desc: '你喜欢有深度的思考，也在乎内心的共鸣。你选择的不只是答案，而是一种理解世界的方式。' },
        '实用主义+审美偏好': { label: '🎯 优雅实干家', desc: '你追求效率，但拒绝粗糙。你要的是既好用又好看的答案。' },
        '审美偏好+实用主义': { label: '🎯 优雅实干家', desc: '你追求效率，但拒绝粗糙。你要的是既好用又好看的答案。' },
        '创意追求+探索精神': { label: '🚀 星际探险家', desc: '你总是好奇不同的视角，愿意尝试新模型、新可能。你享受发现的过程。' },
        '探索精神+创意追求': { label: '🚀 星际探险家', desc: '你总是好奇不同的视角，愿意尝试新模型、新可能。你享受发现的过程。' },
        '深度思考+创意追求': { label: '🔮 灵感捕手', desc: '你被独特的角度吸引，在深层思考中寻找创造力的火花。' },
        '创意追求+深度思考': { label: '🔮 灵感捕手', desc: '你被独特的角度吸引，在深层思考中寻找创造力的火花。' },
        '实用主义+深度思考': { label: '🧭 理性导航者', desc: '你重视实用性，但也渴望理解本质。你在效率和深度之间找到了平衡。' },
        '深度思考+实用主义': { label: '🧭 理性导航者', desc: '你重视实用性，但也渴望理解本质。你在效率和深度之间找到了平衡。' },
    };

    const key = top2.join('+');
    const persona = personaTypes[key] || { label: '✨ 星际旅行者', desc: '你的偏好均衡而多元，就像在宇宙中自由穿行，不被任何星球束缚。' };

    document.getElementById('personaLabel').textContent = persona.label;
    document.getElementById('personaDesc').textContent = persona.desc;
}

//  MODEL SELECTION & PRESETS
// ══════════════════════════════════════════════════════
const selected = [];
let currentQ = '';
let chosen = null;
let currentTab = 'writing';

function init() {
    updatePrefDot();
    renderPresets();
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.preset-tab').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0 && tab === 'writing') || (i === 1 && tab === 'thinking'));
    });
    renderPresets();
}

function renderPresets() {
    const chips = document.getElementById('presetChips');
    chips.innerHTML = PRESETS[currentTab].map((text, i) => `
        <button class="preset-chip" onclick="setPreset(${currentTab === 'writing' ? i : i + 3})">${text}</button>
    `).join('');
}

function setPreset(i) {
    const idx = i % PRESETS.writing.length;
    const text = currentTab === 'writing' ? PRESETS.writing[idx] : PRESETS.thinking[idx];
    document.getElementById('queryInput').value = text;
    document.getElementById('queryInput').focus();
}

function toggleChip(id) {
    const i = selected.indexOf(id);
    if (i >= 0) selected.splice(i, 1);
    else if (selected.length < 3) selected.push(id);
    updatePlanetUI();
    updateInputBar();
}

function updatePlanetUI() {
    document.querySelectorAll('.planet-wrapper').forEach(wrapper => {
        const id = wrapper.querySelector('.planet').classList[1];
        const planet = wrapper.querySelector('.planet');
        if (selected.includes(id)) {
            planet.classList.remove('dim');
        } else if (selected.length > 0) {
            planet.classList.add('dim');
        } else {
            planet.classList.remove('dim');
        }
    });
}

function updateInputBar() {
    const bar = document.getElementById('inputBar');
    bar.className = 'input-bar';
    if (selected.includes('gemini')) bar.classList.add('with-gemini');
    if (selected.includes('deepseek')) bar.classList.add('with-deepseek');
    if (selected.includes('glm')) bar.classList.add('with-glm');
    document.getElementById('compareBtn').disabled = selected.length === 0;
}

// ══════════════════════════════════════════════════════
//  COMPARE
// ══════════════════════════════════════════════════════
function startCompare() {
    const q = document.getElementById('queryInput').value.trim();
    if (!q || selected.length === 0) return;
    currentQ = q;
    chosen = null;

    // Clear input and hide presets
    document.getElementById('queryInput').value = '';
    document.getElementById('presetSection').style.display = 'none';

    // Make planets spin (thinking state)
    document.querySelectorAll('.planet').forEach(p => {
        const modelClass = [...p.classList].find(c => ['gemini','deepseek','glm'].includes(c));
        if (modelClass && selected.includes(modelClass)) {
            p.classList.add('thinking');
        } else {
            p.classList.add('dim');
        }
    });

    // Show skeleton loading in results area
    const rw = document.getElementById('resultsWrapper');
    rw.style.display = 'block';
    document.getElementById('summaryCard').innerHTML = '';
    const grid = document.getElementById('modelsGrid');
    grid.className = `models-grid cols-${selected.length}`;
    grid.innerHTML = selected.map(id => {
        const m = MODELS.find(x => x.id === id);
        return `<div class="model-card" style="--card-color:${m.c};--card-border:rgba(${hexToRgb(m.c)},0.2);">
            <div class="card-header">
                <div class="card-icon" style="background:${m.c}">${m.icon}</div>
                <div class="card-info"><h3>${m.name}</h3><p>${m.org}</p></div>
            </div>
            <div class="skeleton" style="height:11px;width:55%;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:11px;width:88%;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:11px;width:72%;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:11px;width:80%;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:11px;width:48%;"></div>
        </div>`;
    }).join('');

    fetch('http://localhost:3001/api/compare', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: q, models: selected })
    })
    .then(res => {
        if (!res.ok) throw new Error(`服务器返回 ${res.status}`);
        return res.json();
    })
    .then(data => {
        // Hide planets, stop spinning
        document.querySelectorAll('.planet').forEach(p => p.classList.remove('thinking', 'dim'));
        document.getElementById('planetsContainer').classList.add('hidden-up');
        renderResults(data);
    })
    .catch(err => {
        document.querySelectorAll('.planet').forEach(p => p.classList.remove('thinking', 'dim'));
        showToast('❌ 请求失败：' + err.message + '（请确认后端服务正在运行）');
        console.error(err);
    });
}

function renderResults(apiData) {
    const analysis = apiData.analysis || {};
    const contentMap = {};
    (apiData.results || []).forEach(r => { contentMap[r.modelId] = r; });

    const rw = document.getElementById('resultsWrapper');
    rw.style.display = 'block';

    const summaryEl = document.getElementById('summaryCard');
    const summaryText = (analysis && analysis.summary) || '探索完成，请查看下方各星球回答。';
    const chips = (analysis && analysis.chips) || [];
    const eyebrow = selected.length === 1 ? '📋 星球概览' : '🔍 差异总结';
    summaryEl.innerHTML = `
        <div class="summary-eyebrow">${eyebrow}</div>
        <div class="summary-text">${summaryText}</div>
        ${chips.length ? `<div class="summary-chips">${chips.map(c => `<span class="summary-chip">${c}</span>`).join('')}</div>` : ''}`;

    const grid = document.getElementById('modelsGrid');
    grid.className = `models-grid cols-${selected.length}`;
    grid.innerHTML = '';

    selected.forEach(id => {
        const m = MODELS.find(x => x.id === id);
        const resultEntry = contentMap[id] || {};
        const modelAnalysis = (analysis.models && analysis.models[id]) || {};

        const tags = (modelAnalysis.tags || []).map(tag => ({
            t: tag.label,
            c: tagClass(tag.type)
        }));

        const stats = modelAnalysis.stats || {};
        const keyPoint = modelAnalysis.keyPoint || '';
        const fullAnswer = resultEntry.error
            ? `⚠️ 请求失败：${resultEntry.error}`
            : (resultEntry.content || '');

        const col = document.createElement('div');
        col.className = 'model-card';
        col.id = `col-${id}`;
        col.style.setProperty('--card-color', m.c);
        col.style.setProperty('--card-dark', m.bg);
        col.style.setProperty('--card-shadow', m.shadow);
        col.style.setProperty('--card-border', `rgba(${hexToRgb(m.c)}, 0.2)`);

        const statsHtml = Object.keys(stats).length > 0
            ? `<div class="stats-grid">${Object.entries(stats).map(([k,v])=>`
                <div class="stat-item">
                    <div class="stat-name">${k}</div>
                    <div class="stat-bar">
                        <div class="stat-fill" style="width:${v}%;background:${m.c};"></div>
                    </div>
                    <div class="stat-val">${v}%</div>
                </div>`).join('')}</div>`
            : '';

        const isSingleModel = selected.length === 1;
        const hasError = !!resultEntry.error;

        if (hasError) {
            col.innerHTML = `
                <div class="card-header">
                    <div class="card-icon">${m.icon}</div>
                    <div class="card-info"><h3>${m.name}</h3><p>${m.org}</p></div>
                </div>
                <div style="padding:20px;text-align:center;">
                    <div style="font-size:28px;margin-bottom:8px;">⚠️</div>
                    <div style="font-size:13px;color:#fca5a5;font-weight:600;margin-bottom:4px;">请求失败</div>
                    <div style="font-size:12px;color:#64748b;">${resultEntry.error}</div>
                </div>`;
        } else {
            col.innerHTML = `
                <div class="card-header">
                    <div class="card-icon">${m.icon}</div>
                    <div class="card-info"><h3>${m.name}</h3><p>${m.org}</p></div>
                </div>
                <div class="card-tags">${tags.length ? tags.map(t=>`<span class="tag ${t.c}">${t.t}</span>`).join('') : ''}</div>
                ${statsHtml}
                ${keyPoint ? `<div class="keypoint">
                    <div class="keypoint-label">⚡ 核心摘要</div>
                    <div class="keypoint-text">${keyPoint}</div>
                </div>` : ''}
                <div class="answer-section">
                    ${isSingleModel ? '' : `<button class="toggle-btn" id="toggle-${id}" onclick="toggleAnswer('${id}')">
                        <span class="arrow">↓</span> 展开完整回答
                    </button>`}
                    <div class="answer-content ${isSingleModel ? 'open' : ''}" id="answer-${id}">${fmt(fullAnswer)}</div>
                </div>
                <div class="card-actions">
                    <button class="choose-btn" id="selbtn-${id}" onclick="chooseModel('${id}')">选择这个回答</button>
                </div>`;
        }
        grid.appendChild(col);
    });

    rs.style.opacity = '0'; rs.style.transform = 'translateY(12px)';
    rs.style.transition = 'all 0.35s ease';
    setTimeout(() => { rs.style.opacity = '1'; rs.style.transform = 'translateY(0)'; }, 30);
}

function hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '0, 0, 0';
}

function toggleAnswer(id) {
    const el = document.getElementById(`answer-${id}`);
    const btn = document.getElementById(`toggle-${id}`);
    const isOpen = el.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    btn.querySelector('.arrow').style.transform = isOpen ? 'rotate(180deg)' : '';
    btn.childNodes[1].textContent = isOpen ? ' 收起回答' : ' 展开完整回答';
}

function chooseModel(id) {
    selected.forEach(sid => {
        document.getElementById(`col-${sid}`)?.classList.remove('is-selected');
        const b = document.getElementById(`selbtn-${sid}`);
        if (b) { b.textContent = '选择这个回答'; b.disabled = false; }
        // Remove old reaction panels
        const oldPanel = document.getElementById(`col-${sid}`)?.querySelector('.reactions-panel');
        if (oldPanel) oldPanel.remove();
    });
    document.getElementById(`col-${id}`).classList.add('is-selected');
    const btn = document.getElementById(`selbtn-${id}`);
    btn.textContent = '✓ 已选择';
    btn.disabled = true;
    chosen = id;

    recordChoice(currentQ, id);

    const m = MODELS.find(x => x.id === id);
    showReactionsPanel(id, m);
}

function showReactionsPanel(modelId, model) {
    const card = document.getElementById(`col-${modelId}`);
    const existing = card.querySelector('.reactions-panel');
    if (existing) existing.remove();

    const panel = document.createElement('div');
    panel.className = 'reactions-panel';
    panel.innerHTML = `
        <div class="reactions-header">为什么选了这个？</div>
        <div class="reaction-bubbles">
            <button class="reaction-btn" onclick="reactAndClose('${modelId}', '💡 说到心坎里了')">💡 说到心坎里了</button>
            <button class="reaction-btn" onclick="reactAndClose('${modelId}', '🌊 写得比我好')">🌊 写得比我好</button>
            <button class="reaction-btn" onclick="reactAndClose('${modelId}', '🧠 角度很独特')">🧠 角度很独特</button>
            <button class="reaction-btn" onclick="reactAndClose('${modelId}', '🎯 就是我想要的')">🎯 就是我想要的</button>
            <button class="reaction-btn" onclick="reactAndClose('${modelId}', '😶 另一个更差')">😶 另一个更差</button>
            <button class="reaction-btn" onclick="reactAndClose('${modelId}', '✨ 想继续聊聊')">✨ 想继续聊聊</button>
        </div>
        <input type="text" class="reaction-input" id="reaction-comment-${modelId}" placeholder="想说点什么…">
        <div class="reaction-footer">
            <button class="reactions-skip" onclick="closeReactionsPanel('${modelId}')">跳过</button>
            <button class="deepchat-btn" style="background:${model.c}" onclick="deepDive('${modelId}')">进入 ${model.name} 深聊 →</button>
        </div>
    `;
    card.appendChild(panel);
}

function reactAndClose(modelId, reaction) {
    const comment = document.getElementById(`reaction-comment-${modelId}`)?.value || '';
    recordReaction(currentQ, modelId, reaction, comment);
    showToast('已记录你的想法 ✓');
    showDeepChatOnly(modelId);
}

function closeReactionsPanel(modelId) {
    // Skip → still show deep chat button
    showDeepChatOnly(modelId);
}

function showDeepChatOnly(modelId) {
    const card = document.getElementById(`col-${modelId}`);
    const panel = card?.querySelector('.reactions-panel');
    if (!panel) return;
    const m = MODELS.find(x => x.id === modelId);
    panel.innerHTML = `
        <div class="reaction-footer" style="justify-content:center;">
            <button class="deepchat-btn" style="background:${m.c};width:100%;" onclick="deepDive('${modelId}')">进入 ${m.name} 深聊 →</button>
        </div>
    `;
}

// ══════════════════════════════════════════════════════
//  DEEP CHAT
// ══════════════════════════════════════════════════════
let chatModel = null;
let chatHistory = [];

function deepDive(modelId) {
    chatModel = modelId;
    chatHistory = [];

    const m = MODELS.find(x => x.id === chatModel);
    document.getElementById('chatModelIcon').textContent = m.icon;
    document.getElementById('chatModelIcon').style.background = m.c;
    document.getElementById('chatModelName').textContent = `与 ${m.name} 深聊`;
    document.getElementById('chatModelOrg').textContent = m.org;

    const firstAnswer = document.getElementById(`answer-${chatModel}`)?.innerText || '';
    chatHistory.push({ role: 'user', content: currentQ });
    chatHistory.push({ role: 'assistant', content: firstAnswer });

    const msgBox = document.getElementById('chatMessages');
    msgBox.innerHTML = '';
    addChatBubble('user', currentQ);
    addChatBubble('assistant', firstAnswer);

    document.getElementById('resultsWrapper').style.display = 'none';
    document.querySelector('.main-content').style.display = 'none';
    document.getElementById('inputSection').style.display = 'none';
    document.getElementById('chatSection').classList.add('show');
    document.getElementById('chatInput').focus();
}

function exitChat() {
    document.getElementById('chatSection').classList.remove('show');
    document.getElementById('resultsWrapper').style.display = 'block';
    document.querySelector('.main-content').style.display = 'flex';
    document.getElementById('inputSection').style.display = '';
    chatModel = null;
    chatHistory = [];
}

function backToUniverse() {
    // Return to planet selection view
    document.getElementById('resultsWrapper').style.display = 'none';
    document.getElementById('planetsContainer').classList.remove('hidden-up');
    document.getElementById('presetSection').style.display = '';
    document.querySelector('.main-content').style.display = 'flex';
    chosen = null;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function addChatBubble(role, text) {
    const msgBox = document.getElementById('chatMessages');
    const bubble = document.createElement('div');
    bubble.className = `chat-bubble ${role}`;
    bubble.innerHTML = role === 'assistant' ? fmt(text) : esc(text).replace(/\n/g, '<br>');
    msgBox.appendChild(bubble);
    msgBox.scrollTop = msgBox.scrollHeight;
    return bubble;
}

async function sendChat() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg || !chatModel) return;

    input.value = '';
    chatHistory.push({ role: 'user', content: msg });
    addChatBubble('user', msg);

    const typing = document.createElement('div');
    typing.className = 'chat-bubble assistant chat-typing';
    typing.textContent = '思考中…';
    document.getElementById('chatMessages').appendChild(typing);
    document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
    document.getElementById('chatSendBtn').disabled = true;

    try {
        const res = await fetch('http://localhost:3001/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: chatModel, messages: chatHistory })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        typing.remove();
        chatHistory.push({ role: 'assistant', content: data.content });
        addChatBubble('assistant', data.content);
    } catch (err) {
        typing.remove();
        addChatBubble('assistant', `⚠️ 请求失败：${err.message}`);
    }
    document.getElementById('chatSendBtn').disabled = false;
    document.getElementById('chatInput').focus();
}

init();
    </script>
