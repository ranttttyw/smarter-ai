<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModelMix · AI 模型对比</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f5f6fa; color: #1a1a2e; min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: white; border-bottom: 1px solid #e5e7eb;
            padding: 14px 28px; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0;
            z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .logo { font-size: 18px; font-weight: 800; color: #6366f1; letter-spacing: -0.5px; }
        .logo span { color: #1f2937; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .header-badge {
            background: #f0f9ff; border: 1px solid #bae6fd; color: #0369a1;
            font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 100px;
        }
        .pref-toggle-btn {
            background: none; border: 1px solid #e5e7eb; border-radius: 8px;
            padding: 5px 12px; font-size: 12px; color: #6b7280; cursor: pointer;
            font-family: inherit; transition: all 0.15s; display: flex; align-items: center; gap: 6px;
        }
        .pref-toggle-btn:hover { border-color: #6366f1; color: #6366f1; background: #f5f3ff; }
        .pref-dot {
            width: 7px; height: 7px; border-radius: 50%; background: #6366f1; display: none;
        }
        .pref-dot.has-data { display: inline-block; }

        /* CONTAINER */
        .container { max-width: 1440px; margin: 0 auto; padding: 28px 24px; }

        /* PREFERENCE PANEL */
        .pref-panel {
            display: none; background: white; border-radius: 20px;
            padding: 22px 24px; margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #e0e7ff;
        }
        .pref-panel.open { display: block; }
        .pref-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
        .pref-title { font-size: 14px; font-weight: 700; color: #1f2937; }
        .pref-subtitle { font-size: 12px; color: #9ca3af; margin-top: 2px; }
        .clear-btn {
            background: none; border: 1px solid #fca5a5; color: #ef4444;
            border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: all 0.15s;
        }
        .clear-btn:hover { background: #fef2f2; }
        .pref-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 18px; }
        .pref-stat-card {
            background: #f9fafb; border-radius: 12px; padding: 14px 16px;
        }
        .psc-label { font-size: 11px; color: #9ca3af; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
        .psc-val { font-size: 22px; font-weight: 800; color: #1f2937; }
        .psc-sub { font-size: 11px; color: #6b7280; margin-top: 3px; }

        .pref-model-bars { margin-bottom: 18px; }
        .pmb-title { font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 10px; }
        .pmb-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .pmb-name { font-size: 12px; color: #4b5563; font-weight: 600; min-width: 90px; }
        .pmb-bar-wrap { flex: 1; height: 8px; background: #f3f4f6; border-radius: 100px; overflow: hidden; }
        .pmb-bar-fill { height: 100%; border-radius: 100px; transition: width 0.5s ease; }
        .pmb-count { font-size: 11px; color: #9ca3af; min-width: 28px; text-align: right; }

        .pref-history-title { font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 10px; }
        .pref-history { display: flex; flex-direction: column; gap: 7px; }
        .pref-hist-row {
            display: flex; align-items: center; justify-content: space-between;
            background: #f9fafb; border-radius: 10px; padding: 9px 14px;
        }
        .phr-q { font-size: 12px; color: #374151; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 12px; }
        .phr-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .phr-model { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 100px; }
        .phr-time { font-size: 11px; color: #9ca3af; }
        .pref-empty { text-align: center; padding: 28px; color: #9ca3af; font-size: 13px; }

        /* QUERY SECTION */
        .query-section {
            background: white; border-radius: 20px; padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px;
        }
        .query-label { font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
        .query-input {
            width: 100%; border: 2px solid #e5e7eb; border-radius: 14px;
            padding: 14px 18px; font-size: 15px; resize: none; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s; font-family: inherit; line-height: 1.6; color: #1f2937;
        }
        .query-input:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99,102,241,0.08); }
        .query-input::placeholder { color: #d1d5db; }

        .presets-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .preset-label { font-size: 11px; color: #d1d5db; font-weight: 500; white-space: nowrap; }
        .preset-btn {
            background: #f9fafb; border: 1px solid #e5e7eb; padding: 5px 12px;
            border-radius: 8px; font-size: 12px; color: #6b7280; cursor: pointer;
            transition: all 0.15s; font-family: inherit; white-space: nowrap;
        }
        .preset-btn:hover { background: #f0f0ff; border-color: #c4b5fd; color: #6366f1; }

        .model-selector-row {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 12px; margin-top: 18px; padding-top: 18px; border-top: 1px solid #f3f4f6;
        }
        .chips-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .chips-label { font-size: 12px; color: #9ca3af; font-weight: 500; }
        .model-chip {
            display: flex; align-items: center; gap: 7px; padding: 7px 14px;
            border: 2px solid #e5e7eb; border-radius: 100px; cursor: pointer;
            transition: all 0.18s; font-size: 13px; font-weight: 600; color: #6b7280;
            background: white; user-select: none;
        }
        .model-chip:hover:not(.disabled) { border-color: #c4b5fd; background: #f5f3ff; color: #6366f1; }
        .model-chip.selected { border-color: var(--c); background: var(--bg); color: var(--c); }
        .model-chip.disabled { opacity: 0.4; cursor: not-allowed; }
        .chip-dot { width: 7px; height: 7px; border-radius: 50%; background: #e5e7eb; transition: background 0.18s; }
        .model-chip.selected .chip-dot { background: var(--c); }
        .action-group { display: flex; align-items: center; gap: 12px; }
        .count-badge { font-size: 12px; color: #9ca3af; }
        .compare-btn {
            background: #6366f1; color: white; border: none; padding: 10px 22px;
            border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer;
            transition: all 0.2s; font-family: inherit; display: flex; align-items: center; gap: 7px;
        }
        .compare-btn:hover:not(:disabled) { background: #4f46e5; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(99,102,241,0.35); }
        .compare-btn:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }

        /* LOADING */
        .loading-section { display: none; }
        .loading-header { text-align: center; padding: 20px 0 16px; color: #9ca3af; font-size: 13px; }
        .loading-spinner {
            display: inline-block; width: 16px; height: 16px; border: 2px solid #e5e7eb;
            border-top-color: #6366f1; border-radius: 50%; animation: spin 0.7s linear infinite;
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-grid { display: grid; gap: 16px; }
        .loading-card { background: white; border-radius: 18px; padding: 22px; display: flex; flex-direction: column; gap: 10px; }
        .skeleton {
            background: linear-gradient(90deg, #f3f4f6 25%, #ebebeb 50%, #f3f4f6 75%);
            background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* RESULTS */
        .results-section { display: none; }
        .summary-card {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            border-radius: 18px; padding: 20px 24px; color: white;
            margin-bottom: 16px; position: relative; overflow: hidden;
        }
        .summary-card::before {
            content: ''; position: absolute; top: -40px; right: -40px;
            width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,0.05);
        }
        .summary-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; opacity: 0.65; text-transform: uppercase; margin-bottom: 8px; }
        .summary-text { font-size: 14px; line-height: 1.65; font-weight: 500; }
        .summary-chips { display: flex; gap: 7px; margin-top: 14px; flex-wrap: wrap; }
        .summary-chip { background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.28); border-radius: 100px; padding: 4px 12px; font-size: 11px; font-weight: 600; }

        .models-grid { display: grid; gap: 14px; }
        .model-col {
            background: white; border-radius: 18px; border: 2px solid transparent;
            transition: border-color 0.25s, box-shadow 0.25s; overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .model-col.is-selected { border-color: var(--c); box-shadow: 0 0 0 4px var(--shadow), 0 4px 16px rgba(0,0,0,0.08); }

        .col-header { padding: 16px 20px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f9fafb; }
        .col-model-info { display: flex; align-items: center; gap: 11px; }
        .col-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; color: white; background: var(--c); flex-shrink: 0; }
        .col-name { font-size: 15px; font-weight: 700; color: #111827; }
        .col-provider { font-size: 11px; color: #9ca3af; margin-top: 1px; }

        .col-analysis { padding: 14px 20px 12px; border-bottom: 1px solid #f9fafb; }
        .analysis-label { font-size: 10px; font-weight: 700; color: #d1d5db; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
        .tags-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
        .tag { padding: 3px 9px; border-radius: 100px; font-size: 10px; font-weight: 700; }
        .t-blue { background: #dbeafe; color: #1d4ed8; }
        .t-green { background: #dcfce7; color: #15803d; }
        .t-orange { background: #ffedd5; color: #c2410c; }
        .t-purple { background: #f3e8ff; color: #7c3aed; }
        .t-gray { background: #f3f4f6; color: #4b5563; }
        .t-yellow { background: #fef9c3; color: #92400e; }
        .t-red { background: #fee2e2; color: #b91c1c; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
        .stat-item { display: flex; flex-direction: column; gap: 4px; }
        .stat-name { font-size: 10px; color: #9ca3af; font-weight: 500; }
        .stat-bar-row { display: flex; align-items: center; gap: 6px; }
        .stat-bar { flex: 1; height: 4px; background: #f3f4f6; border-radius: 100px; overflow: hidden; }
        .stat-fill { height: 100%; border-radius: 100px; transition: width 0.7s cubic-bezier(0.4,0,0.2,1); }
        .stat-val { font-size: 10px; color: #9ca3af; min-width: 24px; text-align: right; }

        .col-keypoint { padding: 13px 20px; background: #fafafa; border-bottom: 1px solid #f3f4f6; }
        .keypoint-label { font-size: 10px; font-weight: 700; color: #d1d5db; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
        .keypoint-text { font-size: 12.5px; color: #374151; line-height: 1.55; }

        .col-answer { border-bottom: 1px solid #f3f4f6; }
        .expand-toggle {
            width: 100%; background: none; border: none; padding: 11px 20px;
            font-size: 12px; color: #9ca3af; cursor: pointer; display: flex;
            align-items: center; gap: 6px; font-family: inherit; font-weight: 500; transition: color 0.15s;
        }
        .expand-toggle:hover { color: #6366f1; }
        .expand-toggle .arrow { transition: transform 0.2s; display: inline-block; }
        .expand-toggle.open .arrow { transform: rotate(180deg); }
        .full-answer-content { display: none; padding: 2px 20px 16px; font-size: 12.5px; color: #374151; line-height: 1.75; border-top: 1px solid #f3f4f6; }
        .full-answer-content.open { display: block; }
        .full-answer-content code { background: #f3f4f6; padding: 1px 5px; border-radius: 4px; font-size: 11.5px; font-family: 'SF Mono', 'Fira Code', monospace; }
        .full-answer-content pre { background: #1f2937; color: #e5e7eb; border-radius: 10px; padding: 12px 16px; font-size: 12px; overflow-x: auto; margin: 10px 0; font-family: 'SF Mono', 'Fira Code', monospace; line-height: 1.6; }
        .full-answer-content strong { color: #111827; }

        .col-select { padding: 14px 20px; }
        .select-btn {
            width: 100%; padding: 10px; border-radius: 12px; font-size: 13px; font-weight: 700;
            cursor: pointer; transition: all 0.2s; border: 2px solid var(--c);
            background: white; color: var(--c); font-family: inherit; letter-spacing: 0.01em;
        }
        .select-btn:hover { background: var(--bg); transform: translateY(-1px); }
        .model-col.is-selected .select-btn { background: var(--c); color: white; }

        /* POST BAR */
        .post-bar {
            display: none; background: white; border-radius: 18px; padding: 18px 24px;
            margin-top: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            align-items: center; justify-content: space-between; gap: 16px;
            flex-wrap: wrap; border: 2px solid #e0e7ff;
        }
        .post-bar.show { display: flex; }
        .post-bar-text { font-size: 14px; color: #4b5563; }
        .post-bar-text strong { color: #1f2937; }
        .post-actions { display: flex; gap: 10px; flex-shrink: 0; }
        .post-btn { padding: 9px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.18s; font-family: inherit; border: none; }
        .post-btn-ghost { background: #f3f4f6; color: #4b5563; }
        .post-btn-ghost:hover { background: #e5e7eb; }
        .post-btn-primary { background: #6366f1; color: white; }
        .post-btn-primary:hover { background: #4f46e5; box-shadow: 0 4px 12px rgba(99,102,241,0.3); }

        /* TOAST */
        .toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1f2937; color: white; padding: 12px 22px;
            border-radius: 12px; font-size: 13px; font-weight: 500;
            opacity: 0; transition: all 0.3s; z-index: 200; white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 900px) {
            .models-grid { grid-template-columns: 1fr !important; }
            .loading-grid { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">Model<span>Mix</span></div>
    <div class="header-right">
        <button class="pref-toggle-btn" onclick="togglePrefPanel()" id="prefToggleBtn">
            <span class="pref-dot" id="prefDot"></span>📊 我的偏好记录
        </button>
        <div class="header-badge">原型演示</div>
    </div>
</header>

<div class="container">

    <!-- 偏好记录面板 -->
    <div class="pref-panel" id="prefPanel">
        <div class="pref-header">
            <div>
                <div class="pref-title">📊 我的偏好记录</div>
                <div class="pref-subtitle">基于你每次选择自动积累，帮你了解自己的 AI 使用习惯</div>
            </div>
            <button class="clear-btn" onclick="clearPrefs()">清空记录</button>
        </div>
        <div id="prefContent"></div>
    </div>

    <!-- 提问区 -->
    <div class="query-section">
        <div class="query-label">你的问题</div>
        <textarea class="query-input" id="queryInput" rows="3"
            placeholder="输入你想问所有 AI 的问题，比如：中国 AI PM 的工作是什么？"></textarea>
        <div class="presets-row">
            <span class="preset-label">试试：</span>
            <button class="preset-btn" onclick="setPreset(0)">中国 AI PM 的工作是什么？</button>
            <button class="preset-btn" onclick="setPreset(1)">如何提高工作效率？</button>
            <button class="preset-btn" onclick="setPreset(2)">Python 还是 JS 更适合初学者？</button>
        </div>
        <div class="model-selector-row">
            <div class="chips-group">
                <span class="chips-label">选择模型（最多 3 个）</span>
                <div id="chipsContainer" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
            </div>
            <div class="action-group">
                <span class="count-badge" id="countBadge">请选择模型</span>
                <button class="compare-btn" id="compareBtn" onclick="startCompare()" disabled>⚡ 开始对比</button>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div class="loading-section" id="loadingSection">
        <div class="loading-header">
            <span class="loading-spinner"></span>正在向 <span id="loadingCount">0</span> 个模型并发查询...
        </div>
        <div class="loading-grid" id="loadingGrid"></div>
    </div>

    <!-- Results -->
    <div class="results-section" id="resultsSection">
        <div class="summary-card" id="summaryCard"></div>
        <div class="models-grid" id="modelsGrid"></div>
        <div class="post-bar" id="postBar">
            <div class="post-bar-text" id="postBarText"></div>
            <div class="post-actions">
                <button class="post-btn post-btn-ghost" onclick="continueAll()">🔄 继续同时提问这些模型</button>
                <button class="post-btn post-btn-primary" id="deepDiveBtn" onclick="deepDive()">进入选中模型深聊 →</button>
            </div>
        </div>
    </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
//  模型配置
// ══════════════════════════════════════════════════════
const MODELS = [
    { id: 'gpt4o',    name: 'GPT-4o',      org: 'OpenAI',    c: '#10a37f', bg: '#f0fdf4', shadow: 'rgba(16,163,127,0.12)',  icon: 'G' },
    { id: 'claude',   name: 'Claude 3.5',  org: 'Anthropic', c: '#d97706', bg: '#fffbeb', shadow: 'rgba(217,119,6,0.12)',   icon: 'C' },
    { id: 'gemini',   name: 'Gemini Pro',  org: 'Google',    c: '#4285f4', bg: '#eff6ff', shadow: 'rgba(66,133,244,0.12)',  icon: 'G' },
    { id: 'deepseek', name: 'DeepSeek V3', org: 'DeepSeek',  c: '#7c3aed', bg: '#f5f3ff', shadow: 'rgba(124,58,237,0.12)', icon: 'D' },
    { id: 'llama',    name: 'Llama 3.1',   org: 'Meta',      c: '#0369a1', bg: '#f0f9ff', shadow: 'rgba(3,105,161,0.12)',   icon: 'L' },
];

const PRESETS = [
    "中国 AI PM 的工作是什么？",
    "如何提高工作效率？",
    "Python 还是 JS 更适合初学者？",
];

// ══════════════════════════════════════════════════════
//  MOCK 数据
// ══════════════════════════════════════════════════════
const MOCK = {

"中国 AI PM 的工作是什么？": {
    summary: "三个模型对「中国 AI PM」的描述侧重点明显不同。GPT-4o 给出了最完整的职责框架，包含从需求到落地的全流程；Claude 着重点出了中国市场特有的挑战（合规、数据主权、模型国产化压力）；Gemini 最直接，给出了招聘 JD 里高频出现的硬技能清单。关键分歧：是否需要技术背景——GPT-4o 和 Gemini 认为要懂大模型，Claude 认为业务判断力比技术更关键。",
    chips: ["GPT-4o 最全面", "Claude 点出中国特色", "Gemini 最贴近 JD 要求"],
    models: {
        gpt4o: {
            tags: [{t:"详细",c:"t-blue"},{t:"职责框架",c:"t-green"},{t:"正式",c:"t-purple"},{t:"分层结构",c:"t-gray"}],
            stats: { "回答长度": 88, "信息密度": 82, "正式程度": 85, "结构化": 92 },
            keyPoint: "将 AI PM 工作拆成「产品策略→数据&模型→工程协作→商业落地」四层框架，强调需要懂大模型能力边界，能做 Prompt Engineering，并与算法团队共同定义评估指标",
            fullAnswer: `**中国 AI PM 的核心职责（全栈视角）**\n\n**1. 产品策略层**\n- 识别 AI 能真正解决的用户问题（而非「为了 AI 而 AI」）\n- 竞品分析：字节 / 阿里 / 百度 / 腾讯 AI 产品的差异化定位\n- 制定 AI 能力路线图，与业务目标对齐\n\n**2. 数据与模型层**\n- 定义训练数据需求和标注规范\n- 理解模型能力边界（幻觉问题、上下文窗口、推理成本）\n- 参与 Prompt 工程和模型评估指标设计（BLEU / 人工评估 / A/B测试）\n- 在国内合规框架下选择模型：自研 vs. 调用文心/通义/混元 API\n\n**3. 跨团队协作层**\n- 与算法工程师对齐技术可行性\n- 与数据团队协调数据采集、清洗、标注\n- 向业务方翻译「AI 能做什么、不能做什么」\n\n**4. 商业落地层**\n- 定义 AI 功能的 GMV / 效率提升 / 用户留存等业务指标\n- 管理 AI 功能的推理成本与商业价值之间的 trade-off\n- 合规审查：《生成式 AI 服务管理暂行办法》要求\n\n**与传统 PM 最大的不同：**\n需要具备「不确定性管理」能力——AI 功能不像传统功能，效果是概率性的，需要在迭代中持续校准预期。`,

            fullAnswer: `做中国 AI PM，和做「AI PM」本身有很多共同之处，但也有一些很中国特色的挑战，我觉得这些才是真正有意思的部分。\n\n**通用部分：**\n- 把用户痛点翻译成模型可以解决的问题\n- 管理 AI 产品天然的不确定性（效果不是 100% 可控的）\n- 在「酷炫的技术」和「真正有用的功能」之间做判断\n\n**中国特有的挑战：**\n\n**模型选型压力**：要在文心一言、通义千问、混元、Kimi、DeepSeek 之间做选择，还要考虑政策导向——很多国企客户有「国产优先」的要求，不能直接用 OpenAI。\n\n**合规红线**：《生成式 AI 服务管理暂行办法》要求对生成内容进行标识、对算法进行备案、对有舆论属性的产品进行安全评估。这些会直接影响产品设计。\n\n**数据本地化**：用户数据不能出境，这在设计 AI 功能时会影响模型选择和数据架构。\n\n**卷的环境**：国内 AI 产品迭代速度极快，今天发布的功能可能三个月后就被竞品复刻。所以 AI PM 更需要判断「什么是真正的护城河」。\n\n我觉得比技术背景更关键的，是对「AI 能解决什么问题、在什么场景下划算」有清醒的判断。`,

            fullAnswer: `工作效率这个问题，很多人关注点可能搞反了——大家总是在问「怎么做更多」，但真正的问题往往是「怎么做对的事」。\n\n**从精力管理开始**\n\n同样是工作 8 小时，有些天结束后感觉充实有成就感，有些天只是疲惫？区别往往在于你是否在状态好的时候做了重要的事。\n\n识别你的「高能时段」——记录一周内你最专注的时间，把最难的任务放在这里。\n\n**关于「虚假忙碌」**\n\n许多知识工作者不停回邮件、开会、处理杂事，感觉一直在忙，但月底发现真正重要的项目几乎没有推进。\n\n建议每天留 2 小时「无打扰深度工作时间」，关掉所有通知，只做一件最重要的事。\n\n**可持续性比短期冲刺更重要**\n\n效率不是高强度冲刺，而是找到可以长期维持的节奏。充足睡眠、适当运动，反而是提升效率的基础。`,

            fullAnswer: `几个直接有效的方法：\n\n🎯 **两分钟法则**（GTD 经典）\n两分钟能搞定的事，现在就做，别放进待办清单。\n\n⚡ **减少，而不是优化**\n很多人的问题不是「做得不够快」，而是「做了太多不该做的事」。先问：这件事真的需要做吗？\n\n🚫 **停止多任务处理**\n研究表明多任务处理会降低 40% 效率。一次只做一件事。\n\n⚠️ **注意陷阱：**\n不要过度优化。花 3 小时设计完美任务管理系统，不如花 20 分钟实际开始做事。很多人的「效率提升」本身就是在逃避真正重要的工作。`,

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let selected = [];
let chosen = null;
let currentQ = '';

// ══════════════════════════════════════════════════════
//  PREFERENCE STORAGE（localStorage）
// ══════════════════════════════════════════════════════
const PREF_KEY = 'modelmix_prefs';

function loadPrefs() {
    try { return JSON.parse(localStorage.getItem(PREF_KEY) || '[]'); }
    catch { return []; }
}

function savePrefs(prefs) {
    localStorage.setItem(PREF_KEY, JSON.stringify(prefs));
}

function recordChoice(question, modelId) {
    const prefs = loadPrefs();
    prefs.unshift({
        question,
        modelId,
        modelName: MODELS.find(m => m.id === modelId)?.name || modelId,
        ts: Date.now()
    });
    // 只保留最近 50 条
    savePrefs(prefs.slice(0, 50));
    updatePrefDot();
    // 如果面板是开着的，刷新内容
    if (document.getElementById('prefPanel').classList.contains('open')) {
        renderPrefContent();
    }
}

function clearPrefs() {
    if (!confirm('确认清空所有偏好记录？')) return;
    localStorage.removeItem(PREF_KEY);
    updatePrefDot();
    renderPrefContent();
    showToast('已清空偏好记录');
}

function updatePrefDot() {
    const prefs = loadPrefs();
    document.getElementById('prefDot').classList.toggle('has-data', prefs.length > 0);
}

function togglePrefPanel() {
    const panel = document.getElementById('prefPanel');
    const isOpen = panel.classList.toggle('open');
    if (isOpen) renderPrefContent();
}

function renderPrefContent() {
    const prefs = loadPrefs();
    const box = document.getElementById('prefContent');

    if (prefs.length === 0) {
        box.innerHTML = `<div class="pref-empty">还没有偏好记录。<br>每次你选择「这个回答」后，数据就会自动积累在这里。</div>`;
        return;
    }

    // 统计各模型选择次数
    const counts = {};
    MODELS.forEach(m => counts[m.id] = 0);
    prefs.forEach(p => { if (counts[p.modelId] !== undefined) counts[p.modelId]++; });
    const maxCount = Math.max(...Object.values(counts), 1);
    const totalChoices = prefs.length;
    const favoriteId = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
    const favoriteModel = MODELS.find(m => m.id === favoriteId);

    // 统计卡片
    const statsHtml = `
        <div class="pref-stats">
            <div class="pref-stat-card">
                <div class="psc-label">总对比次数</div>
                <div class="psc-val">${totalChoices}</div>
                <div class="psc-sub">次主动做出选择</div>
            </div>
            <div class="pref-stat-card">
                <div class="psc-label">最常选择</div>
                <div class="psc-val" style="color:${favoriteModel.c}">${favoriteModel.name}</div>
                <div class="psc-sub">共 ${counts[favoriteId]} 次（${Math.round(counts[favoriteId]/totalChoices*100)}%）</div>
            </div>
            <div class="pref-stat-card">
                <div class="psc-label">最近一次</div>
                <div class="psc-val" style="font-size:14px;padding-top:4px;">${prefs[0].modelName}</div>
                <div class="psc-sub">${timeAgo(prefs[0].ts)}</div>
            </div>
        </div>`;

    // 模型偏好条形图
    const barsHtml = `
        <div class="pref-model-bars">
            <div class="pmb-title">模型偏好分布</div>
            ${MODELS.filter(m => counts[m.id] > 0).sort((a, b) => counts[b.id] - counts[a.id]).map(m => `
                <div class="pmb-row">
                    <div class="pmb-name">${m.name}</div>
                    <div class="pmb-bar-wrap">
                        <div class="pmb-bar-fill" style="width:${counts[m.id]/maxCount*100}%;background:${m.c};"></div>
                    </div>
                    <div class="pmb-count">${counts[m.id]}次</div>
                </div>`).join('')}
        </div>`;

    // 历史记录（最近 8 条）
    const histHtml = `
        <div class="pref-history-title">最近选择记录</div>
        <div class="pref-history">
            ${prefs.slice(0, 8).map(p => {
                const m = MODELS.find(x => x.id === p.modelId);
                return `<div class="pref-hist-row">
                    <div class="phr-q">${p.question}</div>
                    <div class="phr-right">
                        <span class="phr-model" style="background:${m?.bg||'#f3f4f6'};color:${m?.c||'#374151'};">${p.modelName}</span>
                        <span class="phr-time">${timeAgo(p.ts)}</span>
                    </div>
                </div>`;
            }).join('')}
        </div>`;

    box.innerHTML = statsHtml + barsHtml + histHtml;
}

function timeAgo(ts) {
    const diff = Date.now() - ts;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
    if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
    return Math.floor(diff / 86400000) + ' 天前';
}

// ══════════════════════════════════════════════════════
//  CHIPS
// ══════════════════════════════════════════════════════
function init() {
    renderChips();
    updatePrefDot();
}

function setPreset(i) {
    document.getElementById('queryInput').value = PRESETS[i];
}

function renderChips() {
    const box = document.getElementById('chipsContainer');
    box.innerHTML = '';
    MODELS.forEach(m => {
        const isSel = selected.includes(m.id);
        const isDisabled = !isSel && selected.length >= 3;
        const chip = document.createElement('div');
        chip.className = 'model-chip' + (isSel ? ' selected' : '') + (isDisabled ? ' disabled' : '');
        chip.style.setProperty('--c', m.c);
        chip.style.setProperty('--bg', m.bg);
        chip.innerHTML = `<span class="chip-dot"></span>${m.name}`;
        if (!isDisabled) chip.onclick = () => toggleChip(m.id);
        box.appendChild(chip);
    });
    const cnt = selected.length;
    document.getElementById('countBadge').textContent =
        cnt === 0 ? '请选择模型' : cnt === 3 ? `已选 3/3 · 已达上限` : `已选 ${cnt}/3`;
    document.getElementById('compareBtn').disabled = cnt === 0;
}

function toggleChip(id) {
    const i = selected.indexOf(id);
    if (i >= 0) selected.splice(i, 1);
    else if (selected.length < 3) selected.push(id);
    renderChips();
}

// ══════════════════════════════════════════════════════
//  COMPARE
// ══════════════════════════════════════════════════════
function startCompare() {
    const q = document.getElementById('queryInput').value.trim();
    if (!q || selected.length === 0) return;
    currentQ = q;
    chosen = null;
    document.getElementById('postBar').classList.remove('show');
    document.getElementById('resultsSection').style.display = 'none';

    const ls = document.getElementById('loadingSection');
    ls.style.display = 'block';
    document.getElementById('loadingCount').textContent = selected.length;

    const lg = document.getElementById('loadingGrid');
    lg.style.gridTemplateColumns = `repeat(${selected.length}, 1fr)`;
    lg.innerHTML = selected.map(id => {
        const m = MODELS.find(x => x.id === id);
        return `<div class="loading-card">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
                <div style="width:32px;height:32px;border-radius:9px;background:${m.c};display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:13px;">${m.icon}</div>
                <div><div style="font-weight:700;font-size:13px;">${m.name}</div><div style="font-size:11px;color:#9ca3af;">${m.org}</div></div>
            </div>
            <div class="skeleton" style="height:11px;width:55%;"></div>
            <div class="skeleton" style="height:11px;width:88%;"></div>
            <div class="skeleton" style="height:11px;width:72%;"></div>
            <div class="skeleton" style="height:11px;width:80%;"></div>
            <div class="skeleton" style="height:11px;width:48%;"></div>
        </div>`;
    }).join('');

    setTimeout(() => {
        ls.style.display = 'none';
        renderResults(q);
    }, 1600);
}

// ══════════════════════════════════════════════════════
//  RENDER RESULTS
// ══════════════════════════════════════════════════════
function renderResults(q) {
    const data = MOCK[q] || buildGeneric(q);
    const rs = document.getElementById('resultsSection');
    rs.style.display = 'block';

    document.getElementById('summaryCard').innerHTML = `
        <div class="summary-eyebrow">🔍 差异总结</div>
        <div class="summary-text">${data.summary}</div>
        <div class="summary-chips">${data.chips.map(c => `<span class="summary-chip">${c}</span>`).join('')}</div>`;

    const grid = document.getElementById('modelsGrid');
    grid.style.gridTemplateColumns = `repeat(${selected.length}, 1fr)`;
    grid.innerHTML = '';

    selected.forEach(id => {
        const m = MODELS.find(x => x.id === id);
        const d = (data.models && data.models[id]) || buildGenericModel(id, selected.indexOf(id));

        const col = document.createElement('div');
        col.className = 'model-col';
        col.id = `col-${id}`;
        col.style.setProperty('--c', m.c);
        col.style.setProperty('--bg', m.bg);
        col.style.setProperty('--shadow', m.shadow);

        col.innerHTML = `
            <div class="col-header">
                <div class="col-model-info">
                    <div class="col-icon">${m.icon}</div>
                    <div><div class="col-name">${m.name}</div><div class="col-provider">${m.org}</div></div>
                </div>
            </div>
            <div class="col-analysis">
                <div class="analysis-label">内容 & 风格分析</div>
                <div class="tags-row">${d.tags.map(t=>`<span class="tag ${t.c}">${t.t}</span>`).join('')}</div>
                <div class="stats-grid">${Object.entries(d.stats).map(([k,v])=>`
                    <div class="stat-item">
                        <div class="stat-name">${k}</div>
                        <div class="stat-bar-row">
                            <div class="stat-bar"><div class="stat-fill" style="width:${v}%;background:${m.c};"></div></div>
                            <div class="stat-val">${v}%</div>
                        </div>
                    </div>`).join('')}</div>
            </div>
            <div class="col-keypoint">
                <div class="keypoint-label">⚡ 核心亮点</div>
                <div class="keypoint-text">${d.keyPoint}</div>
            </div>
            <div class="col-answer">
                <button class="expand-toggle" id="toggle-${id}" onclick="toggleAnswer('${id}')">
                    <span class="arrow">▾</span> 展开完整回答
                </button>
                <div class="full-answer-content" id="answer-${id}">${fmt(d.fullAnswer)}</div>
            </div>
            <div class="col-select">
                <button class="select-btn" id="selbtn-${id}" onclick="chooseModel('${id}')">选择这个回答</button>
            </div>`;
        grid.appendChild(col);
    });

    rs.style.opacity = '0'; rs.style.transform = 'translateY(12px)';
    rs.style.transition = 'all 0.35s ease';
    setTimeout(() => { rs.style.opacity = '1'; rs.style.transform = 'translateY(0)'; }, 30);
}

function fmt(raw) {
    return raw
        .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre>${esc(code.trim())}</pre>`)
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══════════════════════════════════════════════════════
//  INTERACTIONS
// ══════════════════════════════════════════════════════
function toggleAnswer(id) {
    const el = document.getElementById(`answer-${id}`);
    const btn = document.getElementById(`toggle-${id}`);
    const isOpen = el.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    btn.querySelector('.arrow').style.transform = isOpen ? 'rotate(180deg)' : '';
    btn.childNodes[1].textContent = isOpen ? ' 收起回答' : ' 展开完整回答';
}

function chooseModel(id) {
    selected.forEach(sid => {
        document.getElementById(`col-${sid}`)?.classList.remove('is-selected');
        const b = document.getElementById(`selbtn-${sid}`);
        if (b) b.textContent = '选择这个回答';
    });
    document.getElementById(`col-${id}`).classList.add('is-selected');
    document.getElementById(`selbtn-${id}`).textContent = '✓ 已选择';
    chosen = id;

    // ★ 记录偏好
    recordChoice(currentQ, id);

    const m = MODELS.find(x => x.id === id);
    document.getElementById('postBarText').innerHTML = `你选择了 <strong>${m.name}</strong> 的回答 · 接下来？`;
    document.getElementById('deepDiveBtn').textContent = `进入 ${m.name} 深聊 →`;
    document.getElementById('postBar').classList.add('show');
    setTimeout(() => document.getElementById('postBar').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
}

function continueAll() {
    document.getElementById('queryInput').value = '';
    document.getElementById('postBar').classList.remove('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    document.getElementById('queryInput').focus();
    showToast('已清空，输入新问题继续对比 ✓');
}

function deepDive() {
    if (!chosen) return;
    const m = MODELS.find(x => x.id === chosen);
    showToast(`正在进入 ${m.name} 深度对话模式…`);
}

// ══════════════════════════════════════════════════════
//  GENERIC FALLBACK（非预置问题时）
// ══════════════════════════════════════════════════════
function buildGeneric(q) {
    const topic = q.replace(/[？?。！!]/g, '').substring(0, 15);
    return {
        summary: `针对「${topic}」，三个模型从不同角度给出了回答。整体来看：结构化程度最高的模型给出了框架性分析，注重实用的模型侧重可操作的建议，简洁型模型则直击核心并指出常见误区。展开完整回答可查看详细内容。`,
        chips: ["框架 vs 实用 vs 简洁", "切入视角各有不同", "可展开查看完整内容"],
        models: Object.fromEntries(selected.map((id, i) => [id, buildGenericModel(id, i)]))
    };
}

function buildGenericModel(id, idx) {
    const q = document.getElementById('queryInput').value.trim();
    const topic = q.replace(/[？?。！!]/g, '').substring(0, 20);
    const m = MODELS.find(x => x.id === id);
    const variants = [
        {
            tags: [{t:"详细",c:"t-blue"},{t:"结构化",c:"t-green"},{t:"正式语气",c:"t-purple"}],
            stats: { "回答长度": 82, "信息密度": 78, "正式程度": 85, "结构化": 92 },
            keyPoint: `给出了关于「${topic}」的完整框架性分析，包含多个维度和具体可执行步骤，适合需要系统性方法论的用户`,
            fullAnswer: `**关于「${topic}」的系统分析**\n\n这是一个值得从多个维度思考的问题。\n\n**核心维度一：基础认知**\n首先需要理解背后的核心逻辑和底层原理。很多人在这个问题上容易走弯路，主要是因为对前提假设理解不够清晰。\n\n**核心维度二：实操方法**\n- 第一步：明确你的目标和约束条件\n- 第二步：拆解问题，找到关键变量\n- 第三步：制定可验证的行动计划\n- 第四步：定期复盘和调整\n\n**核心维度三：常见误区**\n许多人在「${topic}」这件事上容易陷入「努力但没有方向」的陷阱，建议先花时间想清楚目标，再开始执行。\n\n**总结**\n综合来看，把握核心逻辑、制定清晰计划、持续迭代，是处理这类问题最有效的方式。`
        },
        {
            tags: [{t:"适中",c:"t-green"},{t:"实用导向",c:"t-orange"},{t:"温和语气",c:"t-blue"}],
            stats: { "回答长度": 60, "信息密度": 65, "正式程度": 52, "结构化": 63 },
            keyPoint: `从用户实际需求出发，提供了关于「${topic}」的可立即执行的具体建议，并分享了真实场景中的注意事项`,
            fullAnswer: `关于「${topic}」，我想先从实际的角度来思考这个问题。\n\n这类问题通常没有一个标准答案，但有一些被验证有效的思路可以参考：\n\n**最重要的一点**\n不要试图一次性解决所有问题。把「${topic}」这件事拆成几个更小的子问题，逐一击破，往往比整体推进效果更好。\n\n**实际操作建议**\n从你最有把握的部分开始，建立初步的正反馈。很多人在面对「${topic}」时容易想太多、做太少。\n\n**一个值得思考的问题**\n你在「${topic}」这件事上，最大的障碍是什么？是信息不够、资源不够、还是不知道怎么开始？不同的障碍需要不同的解法。\n\n总的来说，保持行动是最重要的。完善的计划永远等不来，先迈出第一步，在实践中调整。`
        },
        {
            tags: [{t:"简洁",c:"t-green"},{t:"直接",c:"t-blue"},{t:"⚠️ 有提示",c:"t-red"}],
            stats: { "回答长度": 40, "信息密度": 74, "正式程度": 33, "结构化": 58 },
            keyPoint: `用最少的话说清楚了「${topic}」的核心要点，并主动指出了一个常见误区，信息密度最高`,
            fullAnswer: `关于「${topic}」，直接说几个关键点：\n\n✅ **最关键的事**：搞清楚你真正要解决的问题是什么，很多人在错误的问题上花了大量时间。\n\n✅ **次关键的事**：找到一个可以快速验证的最小方案，先试错，再优化。\n\n✅ **容易忽略的事**：收集反馈，不要闭门造车。\n\n⚠️ **常见误区**：在「${topic}」这件事上，最常见的问题是「过度准备，推迟行动」。完美方案是行动的敌人。\n\n就这些，其他都是细节，边做边学。`
        }
    ];
    return variants[idx % variants.length];
}

// ══════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
}

init();
</script>
